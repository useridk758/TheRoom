<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Room | Unblocked Games & Apps</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <h1>The Room</h1>
        <ul>
            <li><a href="#games">Games</a></li>
            <li><a href="#apps">Apps</a></li>
            <li><a href="#proxy">Proxy</a></li>
        </ul>
    </nav>

    <header class="hero">
        <h2>Enter The Room</h2>
        <div class="proxy-search">
            <input type="text" id="proxy-input" placeholder="Enter URL to browse...">
            <button onclick="launchProxy()">Go</button>
        </div>
    </header>

    <section id="games" class="grid-section">
        <h3>Featured Games</h3>
        <div class="card-container" id="game-list">
            <!-- Game cards will be injected here by script.js -->
        </div>
    </section>

    <script src="script.js"></script>
</body>
</html>
