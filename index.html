<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Room | Secure Workspace</title>
    <link rel="stylesheet" href="style.css">
    <!-- Integration for future portal functionality -->
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
</head>
<body>
    <div class="background-glow"></div>
    
    <main class="hero-wrapper">
        <h1 id="brand">The Room</h1>
        <div id="search-container">
            <input type="text" id="main-input" placeholder="Search resources or enter URL...">
            <button id="launch-btn">Explore</button>
        </div>
    </main>

    <!-- Hidden Owner Commands Menu -->
    <div id="owner-panel" class="hidden">
        <div class="panel-card">
            <h2>Administrative Console</h2>
            <div class="admin-grid">
                <button onclick="adminCmd('clear')">Wipe Cache</button>
                <button onclick="adminCmd('reboot')">Restart Engine</button>
                <button onclick="adminCmd('logs')">View Analytics</button>
                <button id="exit-panel">Close Console</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
