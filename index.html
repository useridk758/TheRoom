<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Room | Workspace</title>
    <link rel="stylesheet" href="style.css">
    <!-- Essential internal scripts for the portal to function -->
    <script src="uv/uv.bundle.js" defer></script>
    <script src="uv/uv.config.js" defer></script>
</head>
<body>
    <header>
        <h1 id="brand">The Room</h1>
        <nav>
            <a href="#assets">Resources</a>
            <a href="#portal">Portal</a>
        </nav>
    </header>

    <main>
        <section id="portal-entry">
            <input type="text" id="entry-field" placeholder="Enter resource ID or URL...">
            <button id="open-btn">Open</button>
        </section>

        <section id="assets" class="content-grid">
            <!-- Example Asset Card -->
            <div class="item-box">
                <h3>Asset 01</h3>
                <button onclick="loadItem('item-link-here')">View</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
